name: pytorch

on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * 5'  # 周五 15:30 北京时间 (周五 07:30 UTC)

env:
  HUAWEICLOUD_IAM_AK: "${{ secrets.HUAWEICLOUD_IAM_AK }}"
  HUAWEICLOUD_IAM_SK: "${{ secrets.HUAWEICLOUD_IAM_SK }}"

jobs:
  main_job:
    runs-on: ubuntu-26.04
    env:
      TZ: Asia/Shanghai
    outputs:
      current_datetime: ${{ steps.global_env.outputs.current_datetime }}
      current_user: ${{ github.actor }}
    steps:
      - name: generate global_env
        id: global_env
        run: |
          set -exuo pipefail
          echo "current_datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

  ubuntu_container_image_build:
    runs-on: ubuntu-26.04
    needs: main_job
    timeout-minutes: 60
    env:
      TZ: Asia/Shanghai
      current_datetime: ${{ needs.main_job.outputs.current_datetime }}
      current_user: ${{ needs.main_job.outputs.current_user }}
    steps:
      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          version: 'v28.5.2'

      - name: clean disk
        run: |
          set -exuo pipefail
          pwd; id; uname -a; docker info; docker images; df -h

      - name: git checkout
        uses: actions/checkout@v6

      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to SWR
        run: docker login -u cn-southwest-2@$HUAWEICLOUD_IAM_AK -p $HUAWEICLOUD_IAM_SK swr.cn-southwest-2.myhuaweicloud.com

      - name: build container image
        run: |
          set -exuo pipefail

          swr_image_url=swr.cn-southwest-2.myhuaweicloud.com/gsc-hub/pytorch:${current_datetime}-x86_64
          ghcr_image_url=ghcr.io/${current_user}/pytorch:${current_datetime}-x86_64

          docker build -f pytorch/Dockerfile --no-cache -t ${swr_image_url} .
          docker tag ${swr_image_url} ${ghcr_image_url}

          docker images
          docker history ${swr_image_url}
          pwd
          df -h

          docker push ${swr_image_url}
          docker push ${ghcr_image_url}

  create_pr:
    runs-on: ubuntu-26.04
    needs: [main_job, ubuntu_container_image_build]
    if: needs.ubuntu_container_image_build.result == 'success'
    permissions:
      contents: write
      pull-requests: write
    env:
      TZ: Asia/Shanghai
      NEW_TAG: ${{ needs.main_job.outputs.current_datetime }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - name: update FROM tags and create PR
        run: |
          set -exuo pipefail

          sed -i "s|ghcr.io/ganecheng/pytorch:[0-9]\{8\}_[0-9]\{6\}|ghcr.io/ganecheng/pytorch:${NEW_TAG}|g" comfyui/Dockerfile

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="auto/update-pytorch-base"
          git checkout -B "${BRANCH}"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(pytorch): 更新基础镜像 tag 至 ${NEW_TAG}"
          git push --force origin "${BRANCH}"

          PR_TITLE="chore(pytorch): 更新基础镜像 tag 至 ${NEW_TAG}"
          printf '%s\n' \
            "Phase 1 基础镜像构建成功，自动更新下游 Dockerfile 的 FROM tag。" \
            "" \
            "## 新 tag" \
            "" \
            "${NEW_TAG}-x86_64" \
            "" \
            "## 更新的文件" \
            "- comfyui/Dockerfile" \
            "" \
            "## 构建详情" \
            "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "" \
            "## 后续操作" \
            "合并此 PR 后，可按 Phase 2 顺序手动触发下游工作流。" \
            > /tmp/pr_body.md

          EXISTING_PR=$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number // empty' 2>/dev/null || echo "")

          if [ -n "${EXISTING_PR}" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "${EXISTING_PR}" --title "${PR_TITLE}" --body-file /tmp/pr_body.md
          else
            gh pr create --title "${PR_TITLE}" --body-file /tmp/pr_body.md --base main --head "${BRANCH}"
          fi