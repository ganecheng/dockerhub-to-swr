name: batch-sync-image

on:
  workflow_dispatch:

env:
  HUAWEICLOUD_IAM_AK: "${{ secrets.HUAWEICLOUD_IAM_AK }}"
  HUAWEICLOUD_IAM_SK: "${{ secrets.HUAWEICLOUD_IAM_SK }}"

jobs:
  build:
    name: DockerHub to SWR
    runs-on: ubuntu-26.04
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - name: Login to SWR
        run: docker login -u cn-southwest-2@$HUAWEICLOUD_IAM_AK -p $HUAWEICLOUD_IAM_SK swr.cn-southwest-2.myhuaweicloud.com

      - name: DockerHub to SWR
        run: |
          sh batch_sync_image/batch-sync-image.sh
