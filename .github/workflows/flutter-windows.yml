name: flutter-windows

on:
  workflow_dispatch:

env:
  HUAWEICLOUD_IAM_AK: "${{ secrets.HUAWEICLOUD_IAM_AK }}"
  HUAWEICLOUD_IAM_SK: "${{ secrets.HUAWEICLOUD_IAM_SK }}"

jobs:
  main_job:
    runs-on: ubuntu-24.04
    env:
      TZ: Asia/Shanghai
    outputs:
      current_datetime: ${{ steps.global_env.outputs.current_datetime }}
      current_user: ${{ github.actor }}
    steps:
      - name: generate global_env
        id: global_env
        run: |
          set -ex
          echo "current_datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

  windows_container_image_build:
    runs-on: windows-2025
    needs: main_job
    env:
      TZ: Asia/Shanghai
      current_datetime: ${{ needs.main_job.outputs.current_datetime }}
      current_user: ${{ needs.main_job.outputs.current_user }}
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to SWR
        shell: powershell
        run: docker login -u "cn-southwest-2@$env:HUAWEICLOUD_IAM_AK" -p "$env:HUAWEICLOUD_IAM_SK" swr.cn-southwest-2.myhuaweicloud.com

      - name: Download skopeo
        shell: powershell
        run: |
          curl.exe -LO https://github.com/passcod/winskopeo/releases/latest/download/skopeo.exe
          Add-Content -Path $env:GITHUB_PATH -Value $PWD

      - name: build container image
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $swr_image_url = "swr.cn-southwest-2.myhuaweicloud.com/gsc-hub/flutter-windows:$env:current_datetime-windows-x86_64"
          $ghcr_image_url = "ghcr.io/$env:current_user/flutter-windows:$env:current_datetime-windows-x86_64"

          docker build -f flutter/windows/Dockerfile --no-cache -t $swr_image_url .

          docker tag $swr_image_url $ghcr_image_url

          docker images
          docker history $swr_image_url
          Get-PSDrive

          skopeo copy docker-daemon:$swr_image_url docker://$swr_image_url

          skopeo copy docker-daemon:$ghcr_image_url docker://$ghcr_image_url
