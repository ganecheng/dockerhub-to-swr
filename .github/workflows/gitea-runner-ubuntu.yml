name: gitea-runner-ubuntu

on:
  workflow_dispatch:

env:
  HUAWEICLOUD_IAM_AK: "${{ secrets.HUAWEICLOUD_IAM_AK }}"
  HUAWEICLOUD_IAM_SK: "${{ secrets.HUAWEICLOUD_IAM_SK }}"

jobs:
  main_job:
    runs-on: ubuntu-26.04
    env:
      TZ: Asia/Shanghai
    outputs:
      current_datetime: ${{ steps.global_env.outputs.current_datetime }}
      current_user: ${{ github.actor }}
    steps:
      - name: generate global_env
        id: global_env
        run: |
          set -exuo pipefail
          echo "current_datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

  build_base:
    runs-on: ubuntu-26.04
    needs: main_job
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      current_datetime: ${{ needs.main_job.outputs.current_datetime }}
      current_user: ${{ needs.main_job.outputs.current_user }}
    steps:
      - name: clean disk
        run: |
          set -exuo pipefail
          pwd; id; uname -a; docker info; docker images; df -h

      - name: git checkout
        uses: actions/checkout@v6

      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to SWR
        run: docker login -u cn-southwest-2@$HUAWEICLOUD_IAM_AK -p $HUAWEICLOUD_IAM_SK swr.cn-southwest-2.myhuaweicloud.com

      - name: build and push base image
        run: |
          set -exuo pipefail

          base_tag=gitea-runner-ubuntu:${current_datetime}-x86_64
          swr_base=swr.cn-southwest-2.myhuaweicloud.com/gsc-hub/${base_tag}
          ghcr_base=ghcr.io/${current_user}/${base_tag}

          docker build -f gitea-runner-ubuntu/Dockerfile --no-cache -t ${swr_base} -t ${ghcr_base} .
          
          docker history ${swr_base}
          docker images
          pwd
          df -h

          skopeo copy docker-daemon:${swr_base} docker://${swr_base}
          skopeo copy docker-daemon:${ghcr_base} docker://${ghcr_base}

  build_extensions:
    runs-on: ubuntu-26.04
    needs: [ main_job, build_base ]
    timeout-minutes: 60
    env:
      TZ: Asia/Shanghai
      current_datetime: ${{ needs.main_job.outputs.current_datetime }}
      current_user: ${{ needs.main_job.outputs.current_user }}
    strategy:
      fail-fast: false
      matrix:
        extension: [ jdk21, jdk25, graalvm-jdk21, graalvm-jdk25, jmeter, flutter ]
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to SWR
        run: docker login -u cn-southwest-2@$HUAWEICLOUD_IAM_AK -p $HUAWEICLOUD_IAM_SK swr.cn-southwest-2.myhuaweicloud.com

      - name: build and push extension image
        run: |
          set -exuo pipefail

          ext=${{ matrix.extension }}
          base_tag=gitea-runner-ubuntu:${current_datetime}-x86_64

          # 从 GHCR 拉取基础镜像
          docker pull ghcr.io/${current_user}/${base_tag}

          ext_tag=gitea-runner-ubuntu-${ext}:${current_datetime}-x86_64
          swr_ext=swr.cn-southwest-2.myhuaweicloud.com/gsc-hub/${ext_tag}
          ghcr_ext=ghcr.io/${current_user}/${ext_tag}

          echo ">>> Building gitea-runner-ubuntu-${ext}..."
          docker build -f gitea-runner-ubuntu/Dockerfile.${ext} --build-arg BASE_IMAGE=ghcr.io/${current_user}/${base_tag} --no-cache -t ${swr_ext} -t ${ghcr_ext} .
          
          docker history ${swr_ext}
          docker images
          pwd
          df -h

          skopeo copy docker-daemon:${swr_ext} docker://${swr_ext}
          skopeo copy docker-daemon:${ghcr_ext} docker://${ghcr_ext}
