name: gitea-runner

on:
  workflow_dispatch:

env:
  HUAWEICLOUD_IAM_AK: "${{ secrets.HUAWEICLOUD_IAM_AK }}"
  HUAWEICLOUD_IAM_SK: "${{ secrets.HUAWEICLOUD_IAM_SK }}"

jobs:
  main_job:
    runs-on: ubuntu-24.04
    env:
      TZ: Asia/Shanghai
    outputs:
      current_datetime: ${{ steps.global_env.outputs.current_datetime }}
      current_user: ${{ github.actor }}
    steps:
      - name: generate global_env
        id: global_env
        run: |
          set -ex
          echo "current_datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

  ubuntu_container_image_build:
    runs-on: ubuntu-24.04
    needs: main_job
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      current_datetime: ${{ needs.main_job.outputs.current_datetime }}
      current_user: ${{ needs.main_job.outputs.current_user }}
    steps:
      - name: clean disk
        run: |
          set -ex
          pwd
          id
          uname -a
          docker info
          docker images
          df -h
          docker images

      - name: git checkout
        uses: actions/checkout@v6

      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to SWR
        run: docker login -u cn-southwest-2@$HUAWEICLOUD_IAM_AK -p $HUAWEICLOUD_IAM_SK swr.cn-southwest-2.myhuaweicloud.com

      - name: build container image
        run: |
          set -exuo pipefail
          
          artifact_image_url=swr.cn-southwest-2.myhuaweicloud.com/gsc-hub/gitea-runner:${current_datetime}-x86_64
          ghcr_image_url=ghcr.io/${current_user}/gitea-runner:${current_datetime}-x86_64
          
          docker build -f gitea-runner/Dockerfile --no-cache -t ${artifact_image_url} .
          docker tag ${artifact_image_url} ${ghcr_image_url}
          
          docker images
          docker history ${artifact_image_url}
          pwd
          df -h
          
          docker push ${artifact_image_url}
          docker push ${ghcr_image_url}

