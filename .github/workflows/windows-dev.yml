name: windows-dev

on:
  workflow_dispatch:

env:
  HUAWEICLOUD_IAM_AK: "${{ secrets.HUAWEICLOUD_IAM_AK }}"
  HUAWEICLOUD_IAM_SK: "${{ secrets.HUAWEICLOUD_IAM_SK }}"

jobs:
  main_job:
    runs-on: ubuntu-26.04
    env:
      TZ: Asia/Shanghai
    outputs:
      current_datetime: ${{ steps.global_env.outputs.current_datetime }}
      current_user: ${{ github.actor }}
    steps:
      - name: generate global_env
        id: global_env
        run: |
          set -exuo pipefail
          echo "current_datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

  windows_container_image_build:
    runs-on: windows-2025
    needs: main_job
    env:
      TZ: Asia/Shanghai
      current_datetime: ${{ needs.main_job.outputs.current_datetime }}
      current_user: ${{ needs.main_job.outputs.current_user }}
    steps:
      - name: git checkout
        uses: actions/checkout@v6

      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to SWR
        shell: bash
        run: docker login -u "cn-southwest-2@${HUAWEICLOUD_IAM_AK}" -p "${HUAWEICLOUD_IAM_SK}" swr.cn-southwest-2.myhuaweicloud.com

      - name: Download skopeo
        shell: bash
        run: |
          curl.exe -LO https://github.com/passcod/winskopeo/releases/latest/download/skopeo.exe
          echo "$(pwd -W)" >> "${GITHUB_PATH}"

          # skopeo 在 Windows 上需要 policy.json 信任策略文件
          policy_dir="${USERPROFILE}/AppData/Roaming/containers"
          mkdir -p "${policy_dir}"
          echo '{"default":[{"type":"insecureAcceptAnything"}]}' > "${policy_dir}/policy.json"

      - name: build container image
        shell: bash
        run: |
          set -euo pipefail

          swr_image_url="swr.cn-southwest-2.myhuaweicloud.com/gsc-hub/windows-dev:${current_datetime}-windows-x86_64"
          ghcr_image_url="ghcr.io/${current_user}/windows-dev:${current_datetime}-windows-x86_64"

          docker build -f windows-dev/Dockerfile --no-cache -t "${swr_image_url}" .

          docker tag "${swr_image_url}" "${ghcr_image_url}"

          docker images
          docker history "${swr_image_url}"
          pwd
          df -h

          skopeo copy "docker-daemon:${swr_image_url}" "docker://${swr_image_url}"
          skopeo copy "docker-daemon:${ghcr_image_url}" "docker://${ghcr_image_url}"
